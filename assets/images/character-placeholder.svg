<svg xmlns="http://www.w3.org/2000/svg" width="280" height="320" viewBox="0 0 280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B8AAE;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#66737A;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="qmark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7E9DBE"/>
      <stop offset="100%" style="stop-color:#5A7A9E"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="10" y="10" width="260" height="300" rx="20" fill="url(#bg)" stroke="#7E9DBE" stroke-width="2" stroke-dasharray="8 4"/>
  
  <!-- Question mark -->
  <text x="140" y="200" font-family="Georgia, serif" font-size="120" font-weight="bold" fill="url(#qmark)" text-anchor="middle">?</text>
  
  <!-- Small dots decoration -->
  <circle cx="60" cy="60" r="4" fill="#7E9DBE" opacity="0.5"/>
  <circle cx="220" cy="60" r="4" fill="#7E9DBE" opacity="0.5"/>
  <circle cx="60" cy="260" r="4" fill="#7E9DBE" opacity="0.5"/>
  <circle cx="220" cy="260" r="4" fill="#7E9DBE" opacity="0.5"/>
</svg>
